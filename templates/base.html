<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChatApp{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #e0e0e0; text-decoration: none; font-weight: 500; }
        nav a:hover { color: #fff; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.95rem; text-decoration: none; }
        .btn-primary { background: #1a1a2e; color: white; }
        .btn-primary:hover { background: #16213e; }
        .btn-danger { background: #e74c3c; color: white; }
        input, textarea { width: 100%; padding: 0.6rem; margin: 0.4rem 0 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
        .messages { list-style: none; margin-bottom: 1rem; }
        .messages li { padding: 0.4rem 0; color: #e74c3c; }
    </style>
</head>
<body>
    <nav>
        <a href="/chat/">ChatApp</a>
        {% if user.is_authenticated %}
            <span style="color:#e0e0e0;">{{ user.username }} &nbsp;|&nbsp; <a href="/accounts/logout/">Logout</a></span>
        {% else %}
            <a href="/accounts/login/">Login</a>
        {% endif %}
    </nav>
    <div class="container">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
